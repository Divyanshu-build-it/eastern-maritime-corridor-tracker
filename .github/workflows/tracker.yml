name: Automated Eastern Maritime Tracker

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows you to run it manually right now

jobs:
  track-freight:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v3

    - name: Initialize Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Data Architecture Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas tabulate

    - name: Execute Live Maritime Analysis
      run: python maritime_tracker.py

    - name: Commit and Stream Logistical Data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add README.md
        git diff --quiet && git diff --cached --quiet || (git commit -m "Automated log update: Live EMC positioning data captured" && git push)
